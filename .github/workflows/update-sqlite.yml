name: Update SQLite

on:
  schedule:
    # Check daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  EMSDK_VERSION: '5.0.5'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT required for tag push to trigger release workflow.
          # Falls back to GITHUB_TOKEN (release workflow won't trigger).
          token: ${{ secrets.PAT || github.token }}

      - name: Check for new upstream version
        id: check
        run: |
          CURRENT=$(grep "SQLITE_VERSION = " src/version.ts | sed "s/.*'\(.*\)'/\1/")
          # Fetch sqlite.h from master to get the actual version
          UPSTREAM_H=$(curl -sL "https://raw.githubusercontent.com/sqlite/sqlite/master/src/sqlite.h.in")
          LATEST_VERSION=$(echo "$UPSTREAM_H" | grep '#define SQLITE_VERSION ' | sed 's/.*"\(.*\)".*/\1/')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST_VERSION" ]; then
            echo "Already up to date ($CURRENT)"
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version available: $CURRENT -> $LATEST_VERSION"
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        if: steps.check.outputs.updated == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool m4 wabt

      - name: Cache emsdk
        if: steps.check.outputs.updated == 'true'
        id: cache-emsdk
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-${{ env.EMSDK_VERSION }}-${{ runner.os }}

      - name: Install emsdk
        if:
          steps.check.outputs.updated == 'true' &&
          steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          ./emsdk/emsdk install ${{ env.EMSDK_VERSION }}

      - name: Activate emsdk
        if: steps.check.outputs.updated == 'true'
        run: |
          ./emsdk/emsdk activate ${{ env.EMSDK_VERSION }}
          source ./emsdk/emsdk_env.sh
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$EM_CONFIG" >> "$GITHUB_ENV"

      - name: Clone SQLite source
        if: steps.check.outputs.updated == 'true'
        run: |
          git clone --depth 1 \
            https://github.com/aperturerobotics/sqlite.git /tmp/sqlite-src

      - name: Build SQLite Wasm (bare-bones)
        if: steps.check.outputs.updated == 'true'
        run: |
          cd /tmp/sqlite-src
          autoreconf -f -i
          ./configure
          make sqlite3.c
          cd ext/wasm
          make -j$(nproc) wasm-bare-bones=1 npm

      - name: Extract build artifacts
        if: steps.check.outputs.updated == 'true'
        run: |
          rm -rf src/bin/*
          unzip -q -o /tmp/sqlite-src/ext/wasm/npm-bundle.zip -d src/bin
          shopt -s nullglob
          entries=(src/bin/*)
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            mv "${entries[0]}"/* src/bin/
            rmdir "${entries[0]}"
          fi
          shopt -u nullglob

      - name: Update version file
        if: steps.check.outputs.updated == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest_version }}"
          cat > src/version.ts <<'HEREDOC'
          // Auto-generated by update-sqlite workflow.
          // Do not edit manually.

          /** SQLite version this build was compiled from. */
          export const SQLITE_VERSION = 'VERSION_PLACEHOLDER'

          /** SQLite git reference used for the build. */
          export const SQLITE_REF = 'master'

          /** Build variant: bare-bones (reduced binary size, no FTS5/RTREE/JSON/WAL). */
          export const BUILD_VARIANT = 'bare-bones'
          HEREDOC
          sed -i 's/^          //' src/version.ts
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" src/version.ts

      - name: Update package.json version
        if: steps.check.outputs.updated == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest_version }}"
          npm version "${VERSION}-build1" --no-git-tag-version

      - name: Setup environment (node + install)
        if: steps.check.outputs.updated == 'true'
        uses: ./.github/actions/node-setup

      - name: Build and test
        if: steps.check.outputs.updated == 'true'
        run: |
          npm run build
          npm run check-types
          npm run test:node

      - name: Commit and tag
        if: steps.check.outputs.updated == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest_version }}"
          TAG="v${VERSION}-build1"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -s -m "chore: update sqlite to ${VERSION} (bare-bones)"
          git tag "$TAG"
          git push origin HEAD "$TAG"
