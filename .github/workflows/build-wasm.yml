name: Build SQLite Wasm

on:
  workflow_dispatch:
    inputs:
      sqlite_ref:
        description: 'SQLite reference (tag, branch, or commit, or "latest")'
        required: true
        default: 'master'
      bare_bones:
        description: 'Build with bare-bones options (reduced size)'
        required: true
        default: '1'

permissions:
  contents: write
  pull-requests: write

env:
  EMSDK_VERSION: '5.0.5'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve SQLite reference
        id: resolve-ref
        run: |
          SQLITE_REF="${{ github.event.inputs.sqlite_ref }}"
          SQLITE_UPSTREAM="https://github.com/sqlite/sqlite.git"
          if [ "$SQLITE_REF" = "latest" ]; then
            echo "Fetching latest tag..."
            LATEST_TAG=$(git ls-remote --tags --sort="v:refname" "$SQLITE_UPSTREAM" "refs/tags/version-*" | tail -n 1 | cut -f 2 | sed 's/refs\/tags\///')
            echo "Latest tag found: $LATEST_TAG"
            SQLITE_REF="$LATEST_TAG"
          fi

          SQLITE_SHA=$(git ls-remote "$SQLITE_UPSTREAM" "$SQLITE_REF" | head -n 1 | cut -f 1)
          if [ -z "$SQLITE_SHA" ]; then
            SQLITE_SHA=$(git ls-remote "$SQLITE_UPSTREAM" "refs/tags/$SQLITE_REF" | head -n 1 | cut -f 1)
          fi
          if [ -z "$SQLITE_SHA" ]; then
            SQLITE_SHA="$SQLITE_REF"
          fi

          echo "sqlite_ref=$SQLITE_REF" >> $GITHUB_OUTPUT
          echo "sqlite_sha=$SQLITE_SHA" >> $GITHUB_OUTPUT
          echo "branch_name=update-sqlite-wasm-${SQLITE_SHA}" >> $GITHUB_OUTPUT

      - name: Check if branch exists
        id: check-branch
        run: |
          BRANCH_NAME="${{ steps.resolve-ref.outputs.branch_name }}"
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME already exists. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        if: steps.check-branch.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool m4 wabt

      - name: Cache emsdk
        if: steps.check-branch.outputs.skip != 'true'
        id: cache-emsdk
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-${{ env.EMSDK_VERSION }}-${{ runner.os }}

      - name: Install emsdk
        if:
          steps.check-branch.outputs.skip != 'true' &&
          steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          ./emsdk/emsdk install ${{ env.EMSDK_VERSION }}

      - name: Activate emsdk
        if: steps.check-branch.outputs.skip != 'true'
        run: |
          ./emsdk/emsdk activate ${{ env.EMSDK_VERSION }}
          source ./emsdk/emsdk_env.sh
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$EM_CONFIG" >> "$GITHUB_ENV"

      - name: Clone SQLite source
        if: steps.check-branch.outputs.skip != 'true'
        run: |
          SQLITE_REF="${{ steps.resolve-ref.outputs.sqlite_ref }}"
          git clone --depth 1 --branch "$SQLITE_REF" \
            https://github.com/aperturerobotics/sqlite.git /tmp/sqlite-src || \
          git clone https://github.com/aperturerobotics/sqlite.git /tmp/sqlite-src && \
          git -C /tmp/sqlite-src checkout "$SQLITE_REF"

      - name: Build SQLite Wasm
        if: steps.check-branch.outputs.skip != 'true'
        run: |
          cd /tmp/sqlite-src
          autoreconf -f -i
          ./configure
          make sqlite3.c
          cd ext/wasm
          BARE_BONES="${{ github.event.inputs.bare_bones }}"
          MAKE_ARGS="npm"
          if [ "$BARE_BONES" = "1" ]; then
            MAKE_ARGS="wasm-bare-bones=1 $MAKE_ARGS"
          fi
          make -j$(nproc) $MAKE_ARGS

      - name: Extract build artifacts
        if: steps.check-branch.outputs.skip != 'true'
        run: |
          rm -rf src/bin/*
          unzip -q -o /tmp/sqlite-src/ext/wasm/npm-bundle.zip -d src/bin
          shopt -s nullglob
          entries=(src/bin/*)
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            mv "${entries[0]}"/* src/bin/
            rmdir "${entries[0]}"
          fi
          shopt -u nullglob

      - name: Check for changes
        if: steps.check-branch.outputs.skip != 'true'
        id: git-check
        run: |
          git add src/bin
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if:
          steps.check-branch.outputs.skip != 'true' &&
          steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message:
            'chore: update SQLite Wasm binaries from ${{
            steps.resolve-ref.outputs.sqlite_ref }} (${{
            steps.resolve-ref.outputs.sqlite_sha }})'
          title:
            'chore: update SQLite Wasm binaries from ${{
            steps.resolve-ref.outputs.sqlite_ref }}'
          body: |
            Updates SQLite Wasm binaries from ref `${{ steps.resolve-ref.outputs.sqlite_ref }}` (commit `${{ steps.resolve-ref.outputs.sqlite_sha }}`).
            Bare-bones: ${{ github.event.inputs.bare_bones }}
          branch: ${{ steps.resolve-ref.outputs.branch_name }}
          base: master
          delete-branch: true
